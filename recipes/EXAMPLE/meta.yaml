{% set name = "toolname" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  git: https://github.com/author/{{ name }}.git
  rev: v{{ version }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
  run:
    - python >=3.9
    - git

test:
  imports:
    - toolname
  commands:
    - toolname --help

about:
  home: https://github.com/author/{{ name }}
  license: MIT
  summary: 'Short description'

extra:
  recipe-maintainers:
    - your-github-username

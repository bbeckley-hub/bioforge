{% set name = "kleboscope" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

license: MIT

source:
  url: https://github.com/bbeckley-hub/kleboscope/archive/refs/tags/v{{ version }}.zip
  sha256: a5180fd9e8d0fad68289bab66987a639e46303a084d1ba8af1ff8a3dc3d207df

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - pandas >=1.5.0
    - biopython >=1.85
    - psutil >=5.9.0
    - requests >=2.28.0
    - tqdm >=4.64.0
    - click >=8.0.0
    - kaptive >=3.1.0
    - beautifulsoup4 >=4.11.0
    - lxml >=4.9.0
    - matplotlib >=3.5.0
    - seaborn >=0.12.0
    - scipy >=1.10.1
    - plotly >=5.10.0
    - abricate >=1.2.0
    - perl
    - any2fasta
    - blast >=2.13.0
    - perl-moo
    - perl-list-moreutils
    - perl-json
    - perl-lwp-protocol-https
    - perl-path-tiny
    - perl-data-dumper
    - perl-getopt-long
    - perl-file-which
    - git

test:
  imports:
    - kleboscope
  commands:
    - kleboscope --help

about:
  home: https://github.com/bbeckley-hub/kleboscope
  license: MIT
  license_file: LICENSE
  summary: 'Kleboscope: Comprehensive K. pneumoniae genomic typing pipeline'

extra:
  recipe-maintainers:
    - bbeckley-hub
# trigger
